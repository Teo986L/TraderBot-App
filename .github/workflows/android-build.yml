name: Compilar TraderBot Android

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Baixar código
      uses: actions/checkout@v4
      
    - name: ☕ Configurar Java
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        
    - name: 🤖 Configurar Android SDK
      uses: android-actions/setup-android@v3
      
    - name: 🔧 Listar pastas (diagnóstico)
      run: ls -la
      
    - name: 🔧 Verificar permissão
      run: |
        if [ -f "android/gradlew" ]; then
          echo "✅ android/gradlew encontrado"
          chmod +x android/gradlew
        else
          echo "❌ android/gradlew NÃO encontrado"
          ls -la android/
          exit 1
        fi
      
    - name: 🏗️ Compilar APK Debug
      run: |
        cd android
        ./gradlew assembleDebug
      
    - name: 📦 Salvar APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
      
    - name: 📦 Salvar APK alternativo (caso mude de lugar)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: android/app/build/outputs/logs/
